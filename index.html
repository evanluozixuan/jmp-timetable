<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDI Timetable</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
  <meta name="theme-color" content="#0f172a" />
</head>
<body>
  <main class="app">
    <h1>MEDI Timetable</h1>

    <section class="card">
      <h2>Your filters</h2>

      <label for="campusSelect">Campus</label>
      <select id="campusSelect">
        <option value="Callaghan">Callaghan</option>
        <option value="Central Coast">Central Coast</option>
      </select>

      <label for="yearSelect">Year</label>
      <select id="yearSelect">
        <option value="1">Year 1</option>
        <option value="2">Year 2</option>
      </select>

      <label for="pblSelect">PBL Group</label>
      <select id="pblSelect">
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>

      <label for="clinicalSelect">Clinical Group</label>
      <select id="clinicalSelect">
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>

      <button id="saveFiltersBtn">Save filters</button>
      <p id="saveStatus"></p>
    </section>

    <section class="card">
      <h2>Next class</h2>
      <div id="nextResult"></div>
    </section>

    <section class="card">
      <h2>Today's classes</h2>
      <div id="todayResult"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html></html>
