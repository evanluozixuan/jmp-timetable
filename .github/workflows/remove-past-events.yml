name: Remove past timetable events

on:
  schedule:
    - cron: "0 15 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-past-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove past events
        run: node scripts/remove-past-events.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add timetable_y1.json
            git commit -m "Remove past timetable events"
            git push
          fi
